<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <title>المكتبة القانونية الجزائرية</title>
    <style>
        body { 
            font-family: Arial; 
            direction: rtl; 
            text-align: center; 
            padding: 50px; 
            background: #1a5276; 
            color: white; 
        }
        .box { 
            background: white; 
            color: #333; 
            padding: 40px; 
            border-radius: 20px; 
            max-width: 500px; 
            margin: 0 auto; 
        }
        h1 { color: #1a5276; }
        .btn { 
            display: inline-block; 
            padding: 15px 30px; 
            margin: 10px; 
            background: #f39c12; 
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>⚖️ المكتبة القانونية الجزائرية</h1>
        <p>أكبر مصدر إلكتروني للتشريعات الجزائرية</p>
        <a href="#" class="btn">📚 المكتبة</a>
        <a href="#" class="btn">🛒 المتجر</a>
    </div>
</body>
</html>
