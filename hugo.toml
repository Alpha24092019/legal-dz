baseURL = 'https://legal.dz.netlify.app'
languageCode = 'ar-dz'
defaultContentLanguage = 'ar'
title = 'المكتبة القانونية الجزائرية'
theme = 'legal-dz'

[params]
  description = 'أكبر مكتبة قانونية إلكترونية في الجزائر - تحميل مجاني للقوانين وشراء الكتب القانونية'
  author = 'KN19'
  email = 'contact@legal-dz.dz'
  phone = '+213 XXX XX XX XX'

[languages]
  [languages.ar]
    languageName = 'العربية'
    weight = 1
    languagedirection = 'rtl'
    title = 'المكتبة القانونية الجزائرية'
    
    [languages.ar.params]
      navigation = [
        { name = 'الرئيسية', url = '/', weight = 10 },
        { name = 'المقالات', url = '/blog/', weight = 20 },
        { name = 'المكتبة', url = '/library/', weight = 30 },
        { name = 'متجر الكتب', url = '/shop/', weight = 40 }
      ]

[outputs]
  home = ['HTML', 'RSS', 'JSON']
  section = ['HTML', 'RSS']

[outputFormats.JSON]
  mediaType = 'application/json'
  baseName = 'index'
  isPlainText = true

[mediaTypes]
  [mediaTypes.'application/json']
    suffixes = ['json']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[imaging]
  quality = 75
  resampleFilter = 'lanczos'

[build]
  writeStats = true
