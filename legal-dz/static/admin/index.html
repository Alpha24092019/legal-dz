<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>لوحة التحكم - المكتبة القانونية</title>
  
  <!-- Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
    
    body {
      font-family: 'Cairo', sans-serif;
    }
    
    /* تخصيص واجهة CMS للعربية */
    [class*="Pane"] {
      direction: rtl;
    }
    
    .nc-entryEditor-container {
      direction: rtl;
    }
    
    /* تحسينات للألوان */
    :root {
      --primary-color: #1a5276;
      --accent-color: #f39c12;
    }
  </style>
</head>
<body>
  <!-- رسالة التحميل -->
  <div id="loading" style="text-align:center;padding:50px;">
    <h2>جاري تحميل لوحة التحكم...</h2>
    <p>يرجى الانتظار</p>
  </div>

  <!-- Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@^2.10.192/dist/netlify-cms.js"></script>
  
  <script>
    // إخفاء رسالة التحميل
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        document.getElementById('loading').style.display = 'none';
      }, 1000);
    });
    
    // إعداد Netlify Identity
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
    
    // تسجيل معاينة مخصصة للمحتوى القانوني
    CMS.registerPreviewStyle("/admin/preview.css");
    
    // معاينة المقالات
    var ArticlePreview = createClass({
      render: function() {
        var entry = this.props.entry;
        return h('div', {className: 'preview-container'},
          h('h1', {}, entry.getIn(['data', 'title'])),
          h('div', {className: 'meta'}, 
            h('span', {}, 'تاريخ: ' + entry.getIn(['data', 'date'])),
            h('span', {}, ' | التصنيف: ' + entry.getIn(['data', 'categories']))
          ),
          h('div', {className: 'content'}, this.props.widgetFor('body'))
        );
      }
    });
    
    CMS.registerPreviewTemplate("blog", ArticlePreview);
    CMS.registerPreviewTemplate("library", ArticlePreview);
    
    // معاينة المتجر
    var ShopPreview = createClass({
      render: function() {
        var entry = this.props.entry;
        return h('div', {className: 'preview-container shop-preview'},
          h('div', {className: 'product-card'},
            h('div', {className: 'price'}, entry.getIn(['data', 'price']) + ' دج'),
            h('h2', {}, entry.getIn(['data', 'title'])),
            h('p', {}, entry.getIn(['data', 'description']))
          )
        );
      }
    });
    
    CMS.registerPreviewTemplate("shop", ShopPreview);
  </script>
</body>
</html>
