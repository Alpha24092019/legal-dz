backend:
  name: git-gateway
  branch: main
  squash_merges: true
  open_authoring: true

local_backend: true

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

site_url: https://legal-dz.netlify.app
display_url: https://legal-dz.netlify.app
logo_url: https://legal-dz.netlify.app/images/logo.png

locale: 'ar'

slug:
  encoding: 'unicode'
  clean_accents: false
  sanitize_replacement: '-'

collections:
  # المقالات القانونية
  - name: "blog"
    label: "📝 المقالات القانونية"
    label_singular: "مقال"
    description: "المقالات والشروحات القانونية"
    folder: "content/blog"
    path: "{{slug}}/index"
    media_folder: ""
    public_folder: ""
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    sortable_fields: ['date', 'title']
    view_filters:
      - label: المنشورات
        field: draft
        pattern: false
      - label: المسودات
        field: draft
        pattern: true
    view_groups:
      - label: السنة
        field: date
        pattern: \d{4}
      - label: التصنيف
        field: categories
    fields:
      - label: "✏️ العنوان"
        name: "title"
        widget: "string"
        required: true
      
      - label: "📅 التاريخ"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        format: "YYYY-MM-DDTHH:mm:ssZ"
        default: "{{now}}"
      
      - label: "🖼️ الصورة البارزة"
        name: "image"
        widget: "image"
        required: false
        hint: "اختياري - تظهر في قائمة المقالات"
      
      - label: "📝 الوصف المختصر"
        name: "description"
        widget: "text"
        required: true
        hint: "يظهر في نتائج البحث والمشاركات الاجتماعية"
      
      - label: "🏷️ التصنيفات"
        name: "categories"
        widget: "select"
        multiple: true
        options: ["الدستور", "القانون المدني", "القانون التجاري", "قانون العمل", "القانون الجنائي", "القانون الإداري", "القانون الجبائي", "القانون الدولي", "شروحات", "أخبار قانونية"]
        default: ["شروحات"]
      
      - label: "🔖 الوسوم"
        name: "tags"
        widget: "list"
        required: false
        hint: "كلمات مفتاحية مفصولة بفاصلة"
      
      - label: "✅ منشور"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "ألغِ التحديد لنشر المقال"
      
      - label: "📄 المحتوى"
        name: "body"
        widget: "markdown"
        required: true
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - quote
          - bulleted-list
          - numbered-list
        editor_components:
          - image
          - code-block

  # المكتبة القانونية
  - name: "library"
    label: "📚 المكتبة القانونية"
    label_singular: "قانون"
    description: "القوانين والنصوص التنظيمية"
    folder: "content/library"
    path: "{{slug}}/index"
    create: true
    delete: true
    slug: "{{fields.category}}/{{slug}}"
    nested:
      depth: 2
      summary: "{{title}}"
    fields:
      - label: "📋 العنوان"
        name: "title"
        widget: "string"
        required: true
      
      - label: "📂 التصنيف الرئيسي"
        name: "category"
        widget: "select"
        options:
          - { label: "الدستور", value: "دستور" }
          - { label: "القانون المدني", value: "مدني" }
          - { label: "القانون التجاري", value: "تجاري" }
          - { label: "قانون العقوبات", value: "عقوبات" }
          - { label: "قانون الإجراءات", value: "إجراءات" }
          - { label: "قانون العمل", value: "عمالي" }
          - { label: "القانون الجبائي", value: "جبائي" }
          - { label: "القانون الإداري", value: "إداري" }
          - { label: "الجرائد الرسمية", value: "جرائد" }
          - { label: "مواثيق دولية", value: "دولي" }
        required: true
      
      - label: "📅 سنة الصدور"
        name: "year"
        widget: "number"
        value_type: "int"
        min: 1962
        max: 2030
        default: 2024
      
      - label: "🔢 رقم القانون/المرسوم"
        name: "law_number"
        widget: "string"
        required: false
        hint: "مثال: 09-01 أو 23-345"
      
      - label: "📄 عدد الصفحات"
        name: "pages"
        widget: "number"
        value_type: "int"
        min: 1
        default: 10
      
      - label: "📥 حجم الملف"
        name: "file_size"
        widget: "string"
        default: "0 MB"
        hint: "سيُحدّث تلقائياً"
      
      - label: "📎 ملف PDF"
        name: "pdf_url"
        widget: "file"
        media_folder: "/static/pdfs"
        public_folder: "/pdfs"
        required: true
      
      - label: "📝 الوصف"
        name: "description"
        widget: "text"
        required: true
      
      - label: "📊 عدد التحميلات"
        name: "downloads"
        widget: "number"
        value_type: "int"
        default: 0
        required: false
      
      - label: "✅ منشور"
        name: "draft"
        widget: "boolean"
        default: false
      
      - label: "📄 المحتوى / الملخص"
        name: "body"
        widget: "markdown"
        required: false

  # متجر الكتب
  - name: "shop"
    label: "🛒 متجر الكتب"
    label_singular: "كتاب"
    description: "الكتب القانونية المعروضة للبيع"
    folder: "content/shop"
    path: "{{slug}}/index"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - label: "📖 عنوان الكتاب"
        name: "title"
        widget: "string"
        required: true
      
      - label: "💰 السعر (دج)"
        name: "price"
        widget: "number"
        value_type: "int"
        min: 0
        step: 100
        default: 1000
        required: true
      
      - label: "🖼️ صورة الكتاب"
        name: "image"
        widget: "image"
        required: true
        hint: "صورة واضحة للغلاف الأمامي"
      
      - label: "📝 وصف مختصر"
        name: "description"
        widget: "text"
        required: true
        hint: "يظهر في بطاقة المنتج"
      
      - label: "✍️ المؤلف"
        name: "author"
        widget: "string"
        required: false
      
      - label: "🏢 دار النشر"
        name: "publisher"
        widget: "string"
        required: false
      
      - label: "📅 سنة النشر"
        name: "publish_year"
        widget: "number"
        value_type: "int"
        min: 1900
        max: 2030
        default: 2024
      
      - label: "📦 الكمية المتوفرة"
        name: "stock"
        widget: "number"
        value_type: "int"
        min: 0
        default: 10
      
      - label: "⚖️ متاح للبيع"
        name: "available"
        widget: "boolean"
        default: true
      
      - label: "✅ منشور في المتجر"
        name: "draft"
        widget: "boolean"
        default: false
      
      - label: "📄 تفاصيل إضافية"
        name: "body"
        widget: "markdown"
        required: false
        hint: "وصف تفصيلي، فهرس المحتويات، معلومات عن المؤلف..."

# إعدادات إضافية
editor:
  preview: true

publish_mode: editorial_workflow

show_preview_links: true